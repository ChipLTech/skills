# SKILLHUB.yaml — SkillHub Agent Skills manifest
# mattpocock/skills: Skills for real engineers, organized by category.

skills:
  # ── Engineering ───────────────────────────────────────────────────────

  - name: ask-matt
    description: "Ask which skill or flow fits your situation; a router over the skills in this repo"
    path: skills/engineering/ask-matt
    files:
      - SKILL.md
      - "agents/"

  - name: diagnosing-bugs
    description: "Diagnosis loop for hard bugs and performance regressions; use when diagnosing or debugging broken, failing, or slow behavior"
    path: skills/engineering/diagnosing-bugs
    files:
      - SKILL.md
      - "agents/"
      - "scripts/"

  - name: dlc-env-setup
    description: "Bootstrap, rebuild, and verify a DLC workstation toolchain by rediscovering repos, preparing missing source trees such as CMake 3.27.0 and optional local vLLM repos, then validating the PyTorch 2.5.0 wheel and local vLLM stack safely"
    path: skills/engineering/dlc-env-setup
    files:
      - SKILL.md
      - "agents/"
      - "scripts/"

  - name: model-adaptation
    description: "Adapt a specific new or incompatible model for loading or serving on the DLC Platform; use for model-level Attention, MLA, MoE, quantization, multimodal, MTP, or distributed compatibility, not upstream alignment, environment rebuilds, single-operator debugging, independent compile work, or running an existing smoke alone."
    path: skills/engineering/model-adaptation
    files:
      - SKILL.md
      - "agents/"
      - knowledge.md

  - name: main-to-main-upgrade
    description: "Upgrade vllm-dlc main toward an exact upstream vLLM full SHA, recover an unknown Verified vLLM Alignment candidate, or perform complete compatibility-impact analysis; do not use for standalone model adaptation, environment rebuild, single-operator diagnosis, independent compile work, release branch management, or smoke-only requests."
    path: skills/engineering/main-to-main-upgrade
    files:
      - SKILL.md
      - "agents/"
      - knowledge.md

  - name: grill-with-docs
    description: "Grilling session that challenges your plan against the existing domain model, sharpens terminology, and updates CONTEXT.md and ADRs inline"
    path: skills/engineering/grill-with-docs
    files:
      - SKILL.md
      - "ADR-FORMAT.md"
      - "CONTEXT-FORMAT.md"

  - name: triage
    description: "Triage issues through a state machine of triage roles"
    path: skills/engineering/triage
    files:
      - SKILL.md
      - "AGENT-BRIEF.md"
      - "OUT-OF-SCOPE.md"

  - name: improve-codebase-architecture
    description: "Find deepening opportunities in a codebase, informed by the domain language in CONTEXT.md and the decisions in docs/adr/"
    path: skills/engineering/improve-codebase-architecture
    files:
      - SKILL.md
      - "DEEPENING.md"
      - "HTML-REPORT.md"
      - "INTERFACE-DESIGN.md"
      - "LANGUAGE.md"

  - name: setup-matt-pocock-skills
    description: "Scaffold the per-repo config issue tracker, triage label vocabulary, and domain doc layout that the other engineering skills consume"
    path: skills/engineering/setup-matt-pocock-skills
    files:
      - SKILL.md
      - "agents/"
      - "domain.md"
      - "issue-tracker-github.md"
      - "issue-tracker-gitlab.md"
      - "issue-tracker-local.md"
      - "triage-labels.md"

  - name: tdd
    description: "Test-driven development with a red-green-refactor loop that builds features or fixes bugs one vertical slice at a time"
    path: skills/engineering/tdd
    files:
      - SKILL.md
      - "deep-modules.md"
      - "interface-design.md"
      - "mocking.md"
      - "refactoring.md"
      - "tests.md"

  - name: to-spec
    description: "Turn the current conversation into a spec and publish it to the project issue tracker without an additional interview"
    path: skills/engineering/to-spec
    files:
      - SKILL.md
      - "agents/"

  - name: to-tickets
    description: "Break a plan, spec, or conversation into tracer-bullet tickets with explicit blocking edges and publish them to the configured tracker"
    path: skills/engineering/to-tickets
    files:
      - SKILL.md
      - "agents/"

  - name: wayfinder
    description: "Plan work too large for one agent session as a shared map of decision tickets and resolve them until the route is clear"
    path: skills/engineering/wayfinder
    files:
      - SKILL.md
      - "agents/"

  - name: implement
    description: "Implement a piece of work based on a spec or set of tickets"
    path: skills/engineering/implement
    files:
      - SKILL.md
      - "agents/"

  - name: research
    description: "Investigate a question against high-trust primary sources and capture cited findings as a Markdown file in the repo"
    path: skills/engineering/research
    files:
      - SKILL.md
      - "agents/"

  - name: code-review
    description: "Review changes since a fixed point against repository standards and the originating spec using parallel sub-agents"
    path: skills/engineering/code-review
    files:
      - SKILL.md
      - "agents/"

  - name: resolving-merge-conflicts
    description: "Resolve an in-progress git merge or rebase conflict while preserving the intent of both changes where possible"
    path: skills/engineering/resolving-merge-conflicts
    files:
      - SKILL.md
      - "agents/"

  - name: zoom-out
    description: "Tell the agent to zoom out and give broader context or a higher-level perspective on an unfamiliar section of code"
    path: skills/engineering/zoom-out
    files:
      - SKILL.md

  - name: prototype
    description: "Build a throwaway prototype to flesh out a design, either a runnable terminal app for state and business-logic questions or several radically different UI variations"
    path: skills/engineering/prototype
    files:
      - SKILL.md
      - "LOGIC.md"
      - "UI.md"

  # ── Productivity ──────────────────────────────────────────────────────

  - name: caveman
    description: "Ultra-compressed communication mode that cuts token usage by dropping filler while keeping full technical accuracy"
    path: skills/productivity/caveman
    files:
      - SKILL.md

  - name: grill-me
    description: "Relentlessly interview the user about a plan or design until every branch of the decision tree is resolved"
    path: skills/productivity/grill-me
    files:
      - SKILL.md

  - name: handoff
    description: "Compact the current conversation into a handoff document so another agent can continue the work"
    path: skills/productivity/handoff
    files:
      - SKILL.md

  - name: teach
    description: "Teach the user a new skill or concept within a stateful teaching workspace"
    path: skills/productivity/teach
    files:
      - SKILL.md
      - "agents/"
      - "GLOSSARY-FORMAT.md"
      - "LEARNING-RECORD-FORMAT.md"
      - "MISSION-FORMAT.md"
      - "RESOURCES-FORMAT.md"

  - name: writing-great-skills
    description: "Reference for writing and editing predictable skills using clear vocabulary and design principles"
    path: skills/productivity/writing-great-skills
    files:
      - SKILL.md
      - "agents/"
      - "GLOSSARY.md"

  # ── Misc ──────────────────────────────────────────────────────────────

  - name: git-guardrails-claude-code
    description: "Set up Claude Code hooks to block dangerous git commands such as push, reset --hard, and clean before they execute"
    path: skills/misc/git-guardrails-claude-code
    files:
      - SKILL.md
      - "scripts/"

  - name: migrate-to-shoehorn
    description: "Migrate test files from as type assertions to @total-typescript/shoehorn"
    path: skills/misc/migrate-to-shoehorn
    files:
      - SKILL.md

  - name: scaffold-exercises
    description: "Create exercise directory structures with sections, problems, solutions, and explainers"
    path: skills/misc/scaffold-exercises
    files:
      - SKILL.md

  - name: setup-pre-commit
    description: "Set up Husky pre-commit hooks with lint-staged, Prettier, type checking, and tests"
    path: skills/misc/setup-pre-commit
    files:
      - SKILL.md

  # ── In Progress ───────────────────────────────────────────────────────

  - name: writing-beats
    description: "Shape an article as a journey of beats, choose the next pivot step by step, and write until it reaches a natural end"
    path: skills/in-progress/writing-beats
    files:
      - SKILL.md

  - name: writing-fragments
    description: "Run a grilling session that mines writing fragments and appends them to a single document as raw material"
    path: skills/in-progress/writing-fragments
    files:
      - SKILL.md

  - name: writing-shape
    description: "Take a markdown file of raw material and shape it into an article paragraph by paragraph"
    path: skills/in-progress/writing-shape
    files:
      - SKILL.md

  # ── Personal ──────────────────────────────────────────────────────────

  - name: edit-article
    description: "Edit and improve articles by restructuring sections, improving clarity, and tightening prose"
    path: skills/personal/edit-article
    files:
      - SKILL.md

  - name: obsidian-vault
    description: "Search, create, and manage notes in an Obsidian vault with wikilinks and index notes"
    path: skills/personal/obsidian-vault
    files:
      - SKILL.md
